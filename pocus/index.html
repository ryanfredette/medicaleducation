<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#9ebf8a" />
  <title>POCUS — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sage: rgb(158, 191, 138);
      --sage-light: rgba(158, 191, 138, 0.15);
      --sage-dark: rgb(120, 155, 100);
      --bg: #f3f5f3;
      --bg-card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #5d6470;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 4px 12px rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0f1115; --bg-card: #181c22; --text: #f3f4f6; --text-secondary: #b3b9c4; --border: rgba(255,255,255,0.08);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

    .app-header { background: var(--bg-card); border-bottom: 1px solid var(--border); }
    .header-inner { max-width: 760px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .home-link { font-size: 13px; font-weight: 600; color: var(--sage-dark); text-decoration: none; padding: 6px 10px; border-radius: 8px; }
    .home-link:hover { background: var(--sage-light); }
    .header-title h1 { font-size: 18px; font-weight: 700; }

    main { flex: 1; display: grid; place-items: center; padding: 40px 20px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow); padding: 40px 32px; max-width: 480px; text-align: center; }
    .icon-circle { width: 72px; height: 72px; border-radius: 20px; background: var(--sage-light); color: var(--sage-dark); display: grid; place-items: center; font-size: 36px; margin: 0 auto 18px; }
    h2 { font-size: 26px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.01em; }
    p { font-size: 15px; line-height: 1.55; color: var(--text-secondary); margin-bottom: 22px; }
    .btn { display: inline-block; padding: 10px 18px; border-radius: 999px; background: var(--sage); color: white; font-weight: 600; text-decoration: none; font-size: 14px; }
    .btn:hover { background: var(--sage-dark); }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <a href="../index.html" class="home-link">← Home</a>
      <div class="header-title" style="flex:1;"><h1>POCUS</h1></div>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="icon-circle" aria-hidden="true">🩺</div>
      <h2>Coming Soon</h2>
      <p>The Point-of-Care Ultrasound (POCUS) module is under active development. Check back soon.</p>
      <a href="../index.html" class="btn">← Back to home</a>
    </div>
  </main>
</body>
</html>
