<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Proceduralist — A comprehensive medical procedures reference app for clinical training and bedside guidance.">
  <meta name="theme-color" content="#9ebf8a">
  <title>Proceduralist</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- App Styles -->
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      alert("Error: " + msg + "\nLine: " + line + "\nURL: " + url);
      return false;
    };
  </script>

  <!-- ========== HEADER BAR ========== -->
  <header class="header-bar" id="header-bar">
    <div class="header-inner">
      <a href="../index.html" class="header-home-link" aria-label="Back to home" style="display:inline-flex;align-items:center;gap:4px;text-decoration:none;color:var(--text-secondary);font-size:13px;font-weight:600;padding:6px 8px;border-radius:8px;margin-right:4px;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
      </a>
      <div class="header-title">
        <span class="header-logo-icon" aria-hidden="true">
          <i data-lucide="stethoscope"></i>
        </span>
        <h1 class="header-app-name">Proceduralist</h1>
      </div>
      <button class="btn-icon header-menu-btn" id="menu-toggle-btn" aria-label="Open menu" aria-expanded="false" aria-controls="settings-dropdown">
        <i data-lucide="menu"></i>
      </button>
    </div>

  </header>

  <!-- Settings Dropdown -->
  <nav class="settings-dropdown" id="settings-dropdown" aria-label="Settings menu" hidden>
    <button class="settings-dropdown-item" id="menu-about-btn">
      <i data-lucide="info"></i>
      <span>About The App</span>
    </button>
    <button class="settings-dropdown-item" id="menu-preferences-btn">
      <i data-lucide="settings"></i>
      <span>Preferences</span>
    </button>
  </nav>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="content-area" id="app-content">
    <!-- Page content rendered here by JS -->
  </main>

  <!-- ========== BOTTOM TAB BAR ========== -->
  <nav class="tab-bar" id="tab-bar" aria-label="Main navigation">
    <button class="tab-item" data-tab="supplies" aria-label="Supplies">
      <i data-lucide="scissors"></i>
      <span class="tab-label">Supplies</span>
    </button>
    <button class="tab-item active" data-tab="steps" aria-label="Steps">
      <i data-lucide="list"></i>
      <span class="tab-label">Steps</span>
    </button>
    <button class="tab-item" data-tab="portfolio" aria-label="Portfolio">
      <i data-lucide="folder"></i>
      <span class="tab-label">Portfolio</span>
    </button>
    <button class="tab-item" data-tab="references" aria-label="References">
      <i data-lucide="book-open"></i>
      <span class="tab-label">References</span>
    </button>
  </nav>

  <!-- ========== MODAL CONTAINER ========== -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal-container" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close btn-icon" id="modal-close-btn" aria-label="Close modal">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- Modal content injected here -->
      </div>
    </div>
  </div>

  <!-- ========== SCRIPTS ========== -->
  <script src="data/steps-data.js"></script>
  <script src="data/supplies-data.js"></script>
  <script src="data/references-data.js"></script>
  <script src="components/common.js"></script>
  <script src="components/supplies-page.js"></script>
  <script src="components/steps-page.js"></script>
  <script src="components/step-detail.js"></script>
  <script src="components/portfolio-page.js"></script>
  <script src="components/references-page.js"></script>
  <script src="components/preferences.js"></script>
  <script src="components/about.js"></script>
  <script src="app.js"></script>

</body>
</html>
